
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>YouTube Downloader</title>
</head>
<body>

  <div class="container">
    <h1>🎬 YouTube Downloader</h1>

    <input id="url" placeholder="Paste YouTube link here..." />

    <button class="secondary" onclick="getFormats()">
      Get Formats
    </button>

    <select id="formats"></select>

    <button onclick="download()">
      Download Video
    </button>
  </div>

    <script>
 
    async function getFormats() {
    const urlInput = document.getElementById("url");
    const url = urlInput.value.trim();
    const select = document.getElementById("formats");

    if (!url) {
      alert("Please enter a URL");
      return;
    }

    // simple validation
    if (!url.includes("youtube.com") && !url.includes("youtu.be")) {
      alert("Enter a valid YouTube URL");
      return;
    }

    try {
      // UI feedback
      select.innerHTML = "<option>Loading...</option>";

      const res = await fetch(
        `/formats?url=${encodeURIComponent(url)}`
      );

      if (!res.ok) {
        throw new Error("Server error");
      }

      const data = await res.json();

      select.innerHTML = "";

      if (data.length === 0) {
        select.innerHTML = "<option>No formats found</option>";
        return;
      }

      data.forEach((f) => {
        const option = document.createElement("option");

        option.value = f.format_id;
        option.dataset.audio = f.hasAudio;

        option.text = `${f.quality} (${f.ext}) ${
          f.hasAudio ? "OG Audio" : "Merged Audio"
        }`;

        select.appendChild(option);
      });

    } catch (err) {
      console.error(err);
      select.innerHTML = "";
      alert("Failed to fetch formats");
    }
  }

  function download() {
    const url = document.getElementById("url").value.trim();
    const select = document.getElementById("formats");

    if (!url) {
      alert("Enter a URL first");
      return;
    }

    if (!select.value) {
      alert("Select a format");
      return;
    }

    const format = select.value;
    const hasAudio =
      select.options[select.selectedIndex].dataset.audio;

    // UI feedback
    const btn = event.target;
    btn.disabled = true;
    btn.innerText = "Downloading...";

    // trigger download
    window.location.href =
      `/download?url=${encodeURIComponent(url)}&format=${format}&hasAudio=${hasAudio}`;

    // reset button after delay
    setTimeout(() => {
      btn.disabled = false;
      btn.innerText = "Download Video";
    }, 3000);
  }
  
  </script>
</body>
</html
